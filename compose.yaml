services:
  portfolio-backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: portfolio-backend

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "127.0.0.1:8086:8086"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
